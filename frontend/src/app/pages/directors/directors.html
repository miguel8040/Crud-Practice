<h2 class="titleTable">Directors Crud</h2>

<div class="tableContainer">
    <p-table #dt1 [value]="directorServ.allDirectors()" [paginator]="true" [rows]="10"
        [rowsPerPageOptions]="[10, 20, 30]" size="small" [globalFilterFields]="['name','nationality','age']"
        selectionMode="single" dataKey="pkDirector">
        <ng-template #caption>
            <div style="display: flex; justify-content: space-between;">
                <div style="display: flex; gap: 0.5rem;">
                    <p-button (click)="directorUpdateClick(null)" label="Add New" [outlined]="false" size="small"
                        icon="pi pi-plus" (click)="dt1.clear" />
                    <p-button label="Clear" [outlined]="true" size="small" icon="pi pi-filter-slash"
                        (click)="dt1.clear" />
                </div>
                <p-iconfield iconPosition="left" class="ml-auto">
                    <p-inputicon>
                        <i class="pi pi-search"></i>
                    </p-inputicon>
                    <input pSize="small" pInputText type="text" #inputFilter
                        (input)="dt1.filterGlobal(inputFilter.value, 'contains')" placeholder="Search keyword" />
                </p-iconfield>
            </div>
        </ng-template>

        <ng-template #header>

            <tr>
                <th pSortableColumn="pkDirector">PK <p-sortIcon field="pkDirector" /></th>
                <th>
                    Name
                    <p-columnFilter type="text" field="name" display="menu" />
                </th>
                <th>
                    <div class="flex items-center justify-between">
                        Nationality
                        <p-columnFilter field="nationality" matchMode="in" display="menu" [showMatchModes]="false"
                            [showOperator]="false" [showAddButton]="false">
                            <ng-template #filter let-value let-filter="filterCallback">
                                <p-multiselect [(ngModel)]="nationalitySelection"
                                    [options]="directorServ.nationalities()" placeholder="Any"
                                    (onChange)="filter($event.value)" optionLabel="">
                                </p-multiselect>
                            </ng-template>
                        </p-columnFilter>
                    </div>
                </th>
                <th pSortableColumn="code">Age <p-sortIcon field="age" /></th>
            </tr>
        </ng-template>

        <ng-template #body let-director>
            @if(!directorServ.loadingDirectors()){
            <tr (click)="directorUpdateClick(director)">
                <td>{{ director.pkDirector }}</td>
                <td>{{ director.name }}</td>
                <td>{{ director.nationality }}</td>
                <td>{{ director.age }}</td>
            </tr>
            }
        </ng-template>

        <ng-template #footer>
            @if(directorServ.loadingDirectors()){
            <tr *ngFor="let i of [].constructor(5)">
                <td *ngFor="let i of [].constructor(4)">
                    <p-skeleton width="100%" height="1rem"></p-skeleton>
                </td>
            </tr>
            }
        </ng-template>
    </p-table>
</div>


<p-dialog [header]="directorToUpdate && directorToUpdate.pkDirector? 'Edit Director' : 'New Director'" [modal]="true"
    [(visible)]="formVisible">
    <app-director-form *ngIf="formVisible" (onComplete)="onCompleteForm()"
        [director]="directorToUpdate"></app-director-form>

</p-dialog>
